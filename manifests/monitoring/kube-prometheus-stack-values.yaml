# in-cluster Prometheus / Prometheus Operator / Alertmanager は無効化する。
# scrape は AMP Managed Scraper（manifests/amp/scrape-config.yaml）に集約し、
# 長期保存・query は AMP workspace に寄せている。Grafana は AMP datasource のみを使う。
# kube-state-metrics と prometheus-node-exporter は chart デフォルトで有効のまま残し、
# AMP Scraper の scrape_configs から scrape する。
prometheus:
  enabled: false

prometheusOperator:
  enabled: false

alertmanager:
  enabled: false

grafana:
  enabled: true
  defaultDashboardsEnabled: true
  grafana.ini:
    log:
      level: warn
    # AMP datasource を SigV4 で query するため。デフォルトは false で、
    # 明示有効化しないと sigV4Auth: true 指定済みでも署名が走らず、
    # AMP から "Missing Authentication Token" (403) が返る。
    auth:
      sigv4_auth_enabled: true
  serviceAccount:
    create: false
    name: grafana
  adminPassword: admin
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
      logLevel: WARN
    datasources:
      enabled: true
      searchNamespace: ALL
      logLevel: WARN
      # 既定で in-cluster Prometheus 用 datasource (isDefault=true) が生成される。
      # AMP datasource を additionalDataSources で isDefault=true 指定しているため
      # 重複で Grafana 起動失敗（"Only one datasource per organization can be marked as default"）。
      defaultDatasourceEnabled: false
  # AMP を唯一の datasource として登録する。SigV4 で query するため Pod Identity 付き
  # grafana SA に AmazonPrometheusQueryAccess を付与している。
  # datasource 名は "Prometheus" を維持する。Strimzi 公式 dashboard を含む多くの
  # 既存 dashboard が "Prometheus" datasource をハードコード参照するため。
  # AMP は Prometheus 互換 API なので type=prometheus で繋ぐのが正攻法。
  additionalDataSources:
    - name: Prometheus
      type: prometheus
      access: proxy
      url: <AMP_QUERY_URL>
      isDefault: true
      jsonData:
        httpMethod: POST
        sigV4Auth: true
        sigV4AuthType: default
        sigV4Region: <REGION>
      editable: false

# node-exporter は DaemonSet なので全 Taint を許容する
prometheus-node-exporter:
  tolerations:
    - operator: Exists
