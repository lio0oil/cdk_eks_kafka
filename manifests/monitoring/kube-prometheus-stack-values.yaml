# in-cluster Prometheus（StatefulSet）を chart 同梱で動かす構成。
# scrape は Prometheus Operator + PodMonitor / ServiceMonitor 経由（chart 同梱）。
# Grafana は同 chart 同梱の in-cluster Prometheus を datasource として直接 query する。
# Alertmanager は通知要件が出るまで無効化。
prometheus:
  enabled: true
  # CDK 側で Pod Identity 付き SA を作らない（in-cluster Prometheus は AWS API を
  # 叩かないため IAM 不要）。chart デフォルトの SA に任せる。
  prometheusSpec:
    replicas: 1
    # 15 日保持。retention とサンプル取り込みレートで PVC 容量が決まる。
    # 60s scrape × ~70K series × 15 日 = 約 8GB（圧縮後）見込み。
    # gp3 20Gi はその約 2.5 倍のヘッドルームで、cardinality が増えても余裕がある。
    retention: 15d
    # 全 Namespace の ServiceMonitor / PodMonitor を対象にする（PodMonitor を
    # 任意 NS に置けるようにするため）。
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    scrapeConfigSelectorNilUsesHelmValues: false
    # tolerations 未指定で system-nodegroup に乗る（kafka nodegroup の
    # DedicatedKafka taint には toleration を持たないため自然に弾かれる）
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 1Gi
        cpu: 500m
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 20Gi

prometheusOperator:
  enabled: true

alertmanager:
  enabled: false

grafana:
  enabled: true
  defaultDashboardsEnabled: true
  grafana.ini:
    log:
      level: warn
  # CDK 側で Pod Identity 紐付き SA を作成するため Helm からは作らない。
  # IAM 不要（in-cluster Prometheus を query するだけ）。SA は CDK で作るため
  # chart からは create: false にする。
  serviceAccount:
    create: false
    name: grafana
  adminPassword: admin
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
      logLevel: WARN
    datasources:
      enabled: true
      searchNamespace: ALL
      logLevel: WARN
  # chart デフォルトで in-cluster Prometheus を datasource (name: Prometheus,
  # isDefault: true) として自動登録する。Strimzi 公式 dashboard が "Prometheus"
  # 名でハードコード参照するため、デフォルトのまま維持。

# node-exporter は DaemonSet なので全 Taint を許容する
prometheus-node-exporter:
  tolerations:
    - operator: Exists

# kube-state-metrics / prometheusOperator は toleration 未指定のまま system に乗る
# （kafka nodegroup の DedicatedKafka taint で kafka ノードからは弾かれる）
