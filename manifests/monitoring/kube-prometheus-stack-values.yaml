# in-cluster Prometheus / Prometheus Operator / Alertmanager は無効化する。
# scrape は AMP Managed Scraper（manifests/amp/scrape-config.yaml）に集約し、
# 長期保存・query は AMP workspace に寄せている。Grafana は AMP datasource のみを使う。
# kube-state-metrics と prometheus-node-exporter は chart デフォルトで有効のまま残し、
# AMP Scraper の scrape_configs から scrape する。
prometheus:
  enabled: false

prometheusOperator:
  enabled: false

alertmanager:
  enabled: false

grafana:
  enabled: true
  defaultDashboardsEnabled: true
  grafana.ini:
    log:
      level: warn
  serviceAccount:
    create: false
    name: grafana
  adminPassword: admin
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
      logLevel: WARN
    datasources:
      enabled: true
      searchNamespace: ALL
      logLevel: WARN
  # AMP を唯一の datasource として登録する。SigV4 で query するため Pod Identity 付き
  # grafana SA に AmazonPrometheusQueryAccess を付与している。
  additionalDataSources:
    - name: AMP
      type: prometheus
      access: proxy
      url: <AMP_QUERY_URL>
      isDefault: true
      jsonData:
        httpMethod: POST
        sigV4Auth: true
        sigV4AuthType: default
        sigV4Region: <REGION>
      editable: false

# node-exporter は DaemonSet なので全 Taint を許容する
prometheus-node-exporter:
  tolerations:
    - operator: Exists
