apiVersion: v1
kind: ConfigMap
metadata:
  name: adot-config
  namespace: monitoring
data:
  relay: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      awscontainerinsightreceiver: {}
      prometheus:
        config:
          scrape_configs:
            - job_name: kafka-exporter
              static_configs:
                - targets:
                    - kafka-cluster-kafka-exporter.kafka.svc.cluster.local:9404

            - job_name: kafka-jmx
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names: [kafka]
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_strimzi_io_kind]
                  action: keep
                  regex: Kafka
                - source_labels: [__meta_kubernetes_pod_node_name]
                  action: keep
                  regex: "${K8S_NODE_NAME}"
                - source_labels: [__meta_kubernetes_pod_container_port_name]
                  action: keep
                  regex: tcp-prometheus
                - source_labels: [__meta_kubernetes_namespace]
                  target_label: namespace
                - source_labels: [__meta_kubernetes_pod_name]
                  target_label: pod
                - source_labels: [__meta_kubernetes_pod_label_strimzi_io_cluster]
                  target_label: strimzi_io_cluster
                - source_labels: [__meta_kubernetes_pod_label_strimzi_io_pool_name]
                  target_label: pool

            - job_name: strimzi-cluster-operator
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names: [strimzi-system]
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_strimzi_io_kind]
                  action: keep
                  regex: cluster-operator
                - source_labels: [__meta_kubernetes_pod_node_name]
                  action: keep
                  regex: "${K8S_NODE_NAME}"
                - source_labels: [__meta_kubernetes_pod_container_port_name]
                  action: keep
                  regex: http
                - source_labels: [__meta_kubernetes_namespace]
                  target_label: namespace
                - source_labels: [__meta_kubernetes_pod_name]
                  target_label: pod

            - job_name: strimzi-entity-operator
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names: [kafka]
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                  action: keep
                  regex: entity-operator
                - source_labels: [__meta_kubernetes_pod_node_name]
                  action: keep
                  regex: "${K8S_NODE_NAME}"
                - source_labels: [__meta_kubernetes_pod_container_port_name]
                  action: keep
                  regex: healthcheck
                - source_labels: [__meta_kubernetes_namespace]
                  target_label: namespace
                - source_labels: [__meta_kubernetes_pod_name]
                  target_label: pod

            # kubelet cAdvisor: container_cpu_usage_seconds_total / container_memory_usage_bytes を収集
            # DaemonSet のため自ノードのみスクレイプして重複を防ぐ
            - job_name: kubernetes-cadvisor
              scheme: https
              honor_timestamps: false
              tls_config:
                insecure_skip_verify: true
              authorization:
                credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              kubernetes_sd_configs:
                - role: node
              relabel_configs:
                - source_labels: [__meta_kubernetes_node_name]
                  action: keep
                  regex: "${K8S_NODE_NAME}"
                - source_labels: [__meta_kubernetes_node_name]
                  target_label: node
                - target_label: __metrics_path__
                  replacement: /metrics/cadvisor
              metric_relabel_configs:
                - source_labels: [__name__]
                  action: keep
                  regex: "container_cpu_usage_seconds_total|container_memory_usage_bytes|container_memory_working_set_bytes|container_network_receive_bytes_total|container_network_transmit_bytes_total"

    processors:
      batch: {}
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15

    exporters:
      awsxray:
        region: <REGION>
      prometheusremotewrite:
        endpoint: <AMP_REMOTE_WRITE_URL>
        auth:
          authenticator: sigv4auth
      awsemf:
        region: <REGION>
        namespace: ContainerInsights
        log_group_name: /aws/containerinsights/<CLUSTER_NAME>/performance

    extensions:
      sigv4auth:
        region: <REGION>
        service: aps
      health_check: {}

    service:
      extensions: [sigv4auth, health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [awsxray]
        metrics:
          receivers: [awscontainerinsightreceiver, prometheus]
          processors: [memory_limiter, batch]
          exporters: [prometheusremotewrite, awsemf]
