mode: daemonset
image:
  repository: amazon/aws-otel-collector
  tag: v0.40.0
serviceAccount:
  create: false
  name: adot-collector
# chart のデフォルト config（debug エクスポーター含む）を使わず adot-config ConfigMap を使用する
configMap:
  create: false
  existingName: adot-config
tolerations:
  - operator: Exists
# awscontainerinsightreceiver はホストの proc/sys/disk を読むため root かつホスト path をマウントする
securityContext:
  runAsUser: 0
  runAsGroup: 0
extraVolumes:
  - name: rootfs
    hostPath:
      path: /
  - name: sys
    hostPath:
      path: /sys
  - name: devdisk
    hostPath:
      path: /dev/disk/
extraVolumeMounts:
  - name: rootfs
    mountPath: /rootfs
    readOnly: true
  - name: sys
    mountPath: /sys
    readOnly: true
  - name: devdisk
    mountPath: /dev/disk
    readOnly: true
extraEnvs:
  - name: K8S_NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName
  - name: HOST_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName
  - name: HOST_IP
    valueFrom:
      fieldRef:
        fieldPath: status.hostIP
  - name: K8S_NAMESPACE
    valueFrom:
      fieldRef:
        fieldPath: metadata.namespace
resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 200m
