apiVersion: v1
kind: ConfigMap
metadata:
  name: kminion-config
  namespace: monitoring
data:
  config.yaml: |
    kafka:
      brokers:
        - kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092
      tls:
        enabled: false
    minion:
      consumerGroups:
        enabled: true
        allowedGroupIdExpr: ".*"
      topics:
        enabled: true
    exporter:
      port: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kminion
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kminion
  template:
    metadata:
      labels:
        app: kminion
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: kminion
          image: cloudhut/kminion:v2.2.4
          ports:
            - name: metrics
              containerPort: 8080
          env:
            - name: CONFIG_FILEPATH
              value: /etc/kminion/config.yaml
          volumeMounts:
            - name: config
              mountPath: /etc/kminion
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 200m
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: kminion-config
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - system
---
apiVersion: v1
kind: Service
metadata:
  name: kminion
  namespace: monitoring
spec:
  selector:
    app: kminion
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
