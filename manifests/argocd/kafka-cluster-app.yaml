apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-cluster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    # CDK デプロイ時の -c repo-url と同じ GitHub リポジトリ URL を設定する
    # 例: https://github.com/<org>/<repo>
    repoURL: REPO_URL_PLACEHOLDER
    targetRevision: HEAD
    path: manifests/kafka
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
