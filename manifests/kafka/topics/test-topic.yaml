apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: test-topic
  namespace: kafka
  labels:
    # Strimzi Topic Operator は同一 namespace に複数の Kafka CR があった場合
    # このラベルで担当クラスターを識別する。kafka-cluster.yaml の metadata.name と一致させる。
    strimzi.io/cluster: kafka-cluster
spec:
  partitions: 3
  replicas: 3
