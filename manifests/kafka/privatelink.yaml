# ── VPC Endpoint Service (ACK EC2) ──
apiVersion: ec2.services.k8s.aws/v1alpha1
kind: VPCEndpointService
metadata:
  name: kafka-privatelink
  namespace: kafka
spec:
  # CDKで作成された共有NLBのARNを指定
  networkLoadBalancerARNs:
    - arn:aws:elasticloadbalancing:ap-northeast-1:836529485854:loadbalancer/net/kafka-shared-nlb/xxx
  acceptanceRequired: false

---
# ── Target Groups (ACK ELBv2) ──

# Bootstrap (Port 9094 -> NodePort 30094)
apiVersion: elbv2.services.k8s.aws/v1alpha1
kind: TargetGroup
metadata:
  name: kafka-bootstrap-tg
  namespace: kafka
spec:
  name: kafka-bootstrap-tg
  port: 30094
  protocol: TCP
  targetType: instance
  vpcID: vpc-xxx # CDKの出力等から取得

---
# Broker 0 (Port 9095 -> NodePort 30095)
apiVersion: elbv2.services.k8s.aws/v1alpha1
kind: TargetGroup
metadata:
  name: kafka-broker0-tg
  namespace: kafka
spec:
  name: kafka-broker0-tg
  port: 30095
  protocol: TCP
  targetType: instance
  vpcID: vpc-xxx

---
# Broker 1 (Port 9096 -> NodePort 30096)
apiVersion: elbv2.services.k8s.aws/v1alpha1
kind: TargetGroup
metadata:
  name: kafka-broker1-tg
  namespace: kafka
spec:
  name: kafka-broker1-tg
  port: 30096
  protocol: TCP
  targetType: instance
  vpcID: vpc-xxx

---
# Broker 2 (Port 9097 -> NodePort 30097)
apiVersion: elbv2.services.k8s.aws/v1alpha1
kind: TargetGroup
metadata:
  name: kafka-broker2-tg
  namespace: kafka
spec:
  name: kafka-broker2-tg
  port: 30097
  protocol: TCP
  targetType: instance
  vpcID: vpc-xxx

---
# ── Listeners (ACK ELBv2) ──

# Bootstrap Listener (9094)
apiVersion: elbv2.services.k8s.aws/v1alpha1
kind: Listener
metadata:
  name: kafka-bootstrap-listener
  namespace: kafka
spec:
  loadBalancerARN: arn:aws:elasticloadbalancing:ap-northeast-1:836529485854:loadbalancer/net/kafka-shared-nlb/xxx
  port: 9094
  protocol: TCP
  defaultActions:
    - type: forward
      targetGroupARN: $KAFKA_BOOTSTRAP_TG_ARN # ACKが自動解決

---
# Broker 0 Listener (9095)
apiVersion: elbv2.services.k8s.aws/v1alpha1
kind: Listener
metadata:
  name: kafka-broker0-listener
  namespace: kafka
spec:
  loadBalancerARN: arn:aws:elasticloadbalancing:ap-northeast-1:836529485854:loadbalancer/net/kafka-shared-nlb/xxx
  port: 9095
  protocol: TCP
  defaultActions:
    - type: forward
      targetGroupARN: $KAFKA_BROKER0_TG_ARN

---
# Broker 1 Listener (9096)
apiVersion: elbv2.services.k8s.aws/v1alpha1
kind: Listener
metadata:
  name: kafka-broker1-listener
  namespace: kafka
spec:
  loadBalancerARN: arn:aws:elasticloadbalancing:ap-northeast-1:836529485854:loadbalancer/net/kafka-shared-nlb/xxx
  port: 9096
  protocol: TCP
  defaultActions:
    - type: forward
      targetGroupARN: $KAFKA_BROKER1_TG_ARN

---
# Broker 2 Listener (9097)
apiVersion: elbv2.services.k8s.aws/v1alpha1
kind: Listener
metadata:
  name: kafka-broker2-listener
  namespace: kafka
spec:
  loadBalancerARN: arn:aws:elasticloadbalancing:ap-northeast-1:836529485854:loadbalancer/net/kafka-shared-nlb/xxx
  port: 9097
  protocol: TCP
  defaultActions:
    - type: forward
      targetGroupARN: $KAFKA_BROKER2_TG_ARN
