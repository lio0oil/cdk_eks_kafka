# ── VPC Endpoint Service (ACK EC2) ──
# networkLoadBalancerARNs: cdk deploy 後の出力 KafkaSharedNlbArn の値を設定する
apiVersion: ec2.services.k8s.aws/v1alpha1
kind: VPCEndpointService
metadata:
  name: kafka-privatelink
  namespace: kafka
spec:
  networkLoadBalancerARNs:
    - <REPLACE_WITH_CDK_OUTPUT_KafkaSharedNlbArn>
  acceptanceRequired: false

---
# ── Target Groups (ACK ELBv2) ──
# vpcID: cdk deploy 後の出力 VpcId の値を設定する

# Bootstrap (Port 9094 -> NodePort 30094)
apiVersion: elbv2.services.k8s.aws/v1alpha1
kind: TargetGroup
metadata:
  name: kafka-bootstrap-tg
  namespace: kafka
spec:
  name: kafka-bootstrap-tg
  port: 30094
  protocol: TCP
  targetType: instance
  vpcID: <REPLACE_WITH_CDK_OUTPUT_VpcId>

---
# Broker 0 (Port 9095 -> NodePort 30095)
apiVersion: elbv2.services.k8s.aws/v1alpha1
kind: TargetGroup
metadata:
  name: kafka-broker0-tg
  namespace: kafka
spec:
  name: kafka-broker0-tg
  port: 30095
  protocol: TCP
  targetType: instance
  vpcID: <REPLACE_WITH_CDK_OUTPUT_VpcId>

---
# Broker 1 (Port 9096 -> NodePort 30096)
apiVersion: elbv2.services.k8s.aws/v1alpha1
kind: TargetGroup
metadata:
  name: kafka-broker1-tg
  namespace: kafka
spec:
  name: kafka-broker1-tg
  port: 30096
  protocol: TCP
  targetType: instance
  vpcID: <REPLACE_WITH_CDK_OUTPUT_VpcId>

---
# Broker 2 (Port 9097 -> NodePort 30097)
apiVersion: elbv2.services.k8s.aws/v1alpha1
kind: TargetGroup
metadata:
  name: kafka-broker2-tg
  namespace: kafka
spec:
  name: kafka-broker2-tg
  port: 30097
  protocol: TCP
  targetType: instance
  vpcID: <REPLACE_WITH_CDK_OUTPUT_VpcId>

---
# ── Listeners (ACK ELBv2) ──
# loadBalancerARN: cdk deploy 後の出力 KafkaSharedNlbArn の値を設定する
# targetGroupRef で同一ファイル内の TargetGroup CR を参照する（ARN 直接指定は不要）

# Bootstrap Listener (9094)
apiVersion: elbv2.services.k8s.aws/v1alpha1
kind: Listener
metadata:
  name: kafka-bootstrap-listener
  namespace: kafka
spec:
  loadBalancerARN: <REPLACE_WITH_CDK_OUTPUT_KafkaSharedNlbArn>
  port: 9094
  protocol: TCP
  defaultActions:
    - type: forward
      targetGroupRef:
        from:
          name: kafka-bootstrap-tg
          namespace: kafka

---
# Broker 0 Listener (9095)
apiVersion: elbv2.services.k8s.aws/v1alpha1
kind: Listener
metadata:
  name: kafka-broker0-listener
  namespace: kafka
spec:
  loadBalancerARN: <REPLACE_WITH_CDK_OUTPUT_KafkaSharedNlbArn>
  port: 9095
  protocol: TCP
  defaultActions:
    - type: forward
      targetGroupRef:
        from:
          name: kafka-broker0-tg
          namespace: kafka

---
# Broker 1 Listener (9096)
apiVersion: elbv2.services.k8s.aws/v1alpha1
kind: Listener
metadata:
  name: kafka-broker1-listener
  namespace: kafka
spec:
  loadBalancerARN: <REPLACE_WITH_CDK_OUTPUT_KafkaSharedNlbArn>
  port: 9096
  protocol: TCP
  defaultActions:
    - type: forward
      targetGroupRef:
        from:
          name: kafka-broker1-tg
          namespace: kafka

---
# Broker 2 Listener (9097)
apiVersion: elbv2.services.k8s.aws/v1alpha1
kind: Listener
metadata:
  name: kafka-broker2-listener
  namespace: kafka
spec:
  loadBalancerARN: <REPLACE_WITH_CDK_OUTPUT_KafkaSharedNlbArn>
  port: 9097
  protocol: TCP
  defaultActions:
    - type: forward
      targetGroupRef:
        from:
          name: kafka-broker2-tg
          namespace: kafka
