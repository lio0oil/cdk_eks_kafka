apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: controller
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
  annotations:
    strimzi.io/next-node-ids: "[100000000-199999999]"
spec:
  replicas: <CONTROLLER_REPLICAS>
  roles:
    - controller
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 20Gi
        class: gp3
        kraftMetadata: shared
        deleteClaim: <DELETE_CLAIM>
  resources:
    requests:
      memory: 1Gi
      cpu: "250m"
    limits:
      memory: 2Gi
      cpu: "500m"
  jvmOptions:
    -Xms: "512m"
    -Xmx: "1024m"
  template:
    pod:
      tolerations:
        - key: "DedicatedKafka"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - kafka-controller
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            # controller pod 同士を同一ノードに同居させない（KRaft quorum HA 確保）。
            # broker と controller の分離は別 nodegroup の nodeAffinity で物理的に保証済み。
            - labelSelector:
                matchExpressions:
                  - key: strimzi.io/pool-name
                    operator: In
                    values:
                      - controller
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              strimzi.io/name: kafka-cluster-controller
