global:
  # ingestion sample 数 = active series 数 / scrape_interval × 月秒数 で効くため、
  # 60s にすることで AMP ingestion コストが 30s 構成の約半分になる。
  # AMP Managed Scraper は 30s が下限なので 30s 未満は設定不可。
  scrape_interval: 60s
  external_labels:
    cluster: <CLUSTER_NAME>

scrape_configs:
  # Strimzi Kafka resources: broker / controller / cruise-control / kafka-exporter
  # PodMonitor (kafka-resources-metrics) を AMP Scraper の scrape_configs に変換したもの。
  # pod / node / endpoint ラベルは Prometheus Operator が PodMonitor 翻訳時に
  # 常時付与するもの。chart 同梱 recording rule の集約キーとして必須。
  - job_name: kafka-resources-metrics
    metrics_path: /metrics
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [kafka]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_strimzi_io_kind]
        action: keep
        regex: Kafka|KafkaConnect|KafkaMirrorMaker|KafkaMirrorMaker2
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        action: keep
        regex: tcp-prometheus
      - regex: __meta_kubernetes_pod_label_(strimzi_io_.+)
        action: labelmap
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
        action: replace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
        action: replace
      # 旧 PodMonitor が target_label: kubernetes_pod_name で持っていた非標準ラベル。
      # grafana-strimzi-kafka-dashboard.yaml の panel query が依存するため残す。
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: kubernetes_pod_name
        action: replace
      - source_labels: [__meta_kubernetes_pod_container_name]
        target_label: container
        action: replace
      - source_labels: [__meta_kubernetes_pod_node_name]
        target_label: node
        action: replace
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        target_label: endpoint
        action: replace
      - source_labels: [__meta_kubernetes_pod_host_ip]
        target_label: node_ip
        action: replace

  # Strimzi Cluster Operator (strimzi-system namespace)
  - job_name: cluster-operator-metrics
    metrics_path: /metrics
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [strimzi-system]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_strimzi_io_kind]
        action: keep
        regex: cluster-operator
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        action: keep
        regex: http
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
        action: replace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
        action: replace
      - source_labels: [__meta_kubernetes_pod_container_name]
        target_label: container
        action: replace
      - source_labels: [__meta_kubernetes_pod_node_name]
        target_label: node
        action: replace
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        target_label: endpoint
        action: replace

  # Strimzi Entity Operator (Topic / User Operator)
  - job_name: entity-operator-metrics
    metrics_path: /metrics
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [kafka]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
        action: keep
        regex: entity-operator
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        action: keep
        regex: healthcheck
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
        action: replace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
        action: replace
      - source_labels: [__meta_kubernetes_pod_container_name]
        target_label: container
        action: replace
      - source_labels: [__meta_kubernetes_pod_node_name]
        target_label: node
        action: replace
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        target_label: endpoint
        action: replace

  # kube-state-metrics (kube-prometheus-stack 同梱)
  - job_name: kube-state-metrics
    kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names: [monitoring]
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_name]
        action: keep
        regex: kube-state-metrics

  # prometheus-node-exporter (kube-prometheus-stack 同梱、DaemonSet)
  # job 名は AWS observability solution の recording rule 規約 (`job="node-exporter"`)
  # に合わせる。これにより kube-prometheus-stack 互換ダッシュボードがそのまま動く。
  - job_name: node-exporter
    kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names: [monitoring]
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_name]
        action: keep
        regex: prometheus-node-exporter

  # kubelet metrics (各 node の kubelet)
  # kube-prometheus-stack の recording rule は `metrics_path="/metrics"` で kubelet
  # 本体を識別するため、ラベルとして明示的に付与する（`__metrics_path__` は scrape 時の
  # URL 指定で、最終メトリクスには残らない hidden ラベル）。
  - job_name: kubelet
    scheme: https
    authorization:
      type: Bearer
      credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - target_label: metrics_path
        replacement: /metrics
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - replacement: kubernetes.default.svc:443
        target_label: __address__
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /api/v1/nodes/$1/proxy/metrics

  # cAdvisor (container CPU/memory/IO、kubelet 経由)
  # kube-prometheus-stack の recording rule は cadvisor メトリクスを `job="kubelet"`
  # + `metrics_path="/metrics/cadvisor"` で識別する。
  # job_name は識別用に "cadvisor" を残しつつ、relabel で job / metrics_path を上書き。
  - job_name: cadvisor
    scheme: https
    authorization:
      type: Bearer
      credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - target_label: job
        replacement: kubelet
      - target_label: metrics_path
        replacement: /metrics/cadvisor
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - replacement: kubernetes.default.svc:443
        target_label: __address__
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor

  # Kubernetes API server
  # job 名は AWS observability solution の recording rule 規約 (`job="apiserver"`) に合わせる
  - job_name: apiserver
    scheme: https
    authorization:
      type: Bearer
      credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    kubernetes_sd_configs:
      - role: endpoints
    relabel_configs:
      - action: keep
        source_labels:
          - __meta_kubernetes_namespace
          - __meta_kubernetes_service_name
          - __meta_kubernetes_endpoint_port_name
        regex: default;kubernetes;https

  # CoreDNS (kube-system) — EKS デフォルト稼働の DNS。Pod 直接 scrape でメトリクス
  # ポート 9153 を叩く。EKS 標準の coredns Service は port 53 (DNS) のみ公開して
  # おり、port 9153 は pod 側にのみ存在する。
  - job_name: coredns
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [kube-system]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_k8s_app]
        action: keep
        regex: kube-dns
      - source_labels: [__meta_kubernetes_pod_container_port_number]
        action: keep
        regex: "9153"
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
        action: replace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
        action: replace
      - source_labels: [__meta_kubernetes_pod_container_name]
        target_label: container
        action: replace
      - source_labels: [__meta_kubernetes_pod_node_name]
        target_label: node
        action: replace
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        target_label: endpoint
        action: replace

  # kube-proxy (kube-system) — EKS Managed kube-proxy addon。
  # kube-proxy DaemonSet は metrics 用 containerPort を宣言していないため、
  # __address__ を <pod_ip>:10249 に明示的に書き換える。EKS 既定の
  # metricsBindAddress は "0.0.0.0:10249" で全インタフェース公開。
  - job_name: kube-proxy
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [kube-system]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_k8s_app]
        action: keep
        regex: kube-proxy
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        regex: (.+)
        replacement: $1:10249
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
        action: replace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
        action: replace
      - source_labels: [__meta_kubernetes_pod_container_name]
        target_label: container
        action: replace
      - source_labels: [__meta_kubernetes_pod_node_name]
        target_label: node
        action: replace

  # Grafana (monitoring) — Grafana 自身の HTTP request rate / duration 等。
  # kube-prometheus-stack chart 同梱の grafana ServiceMonitor 相当。
  - job_name: grafana
    kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names: [monitoring]
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_name]
        action: keep
        regex: grafana
      - source_labels: [__meta_kubernetes_endpoint_port_name]
        action: keep
        regex: http-web
