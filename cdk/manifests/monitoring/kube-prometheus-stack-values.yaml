# in-cluster Prometheus（StatefulSet）を chart 同梱で動かす構成。
# scrape は Prometheus Operator + PodMonitor / ServiceMonitor 経由（chart 同梱）。
# Grafana は同 chart 同梱の in-cluster Prometheus を datasource として直接 query する。
# Alertmanager は通知要件が出るまで無効化。
prometheus:
  enabled: true
  # CDK 側で Pod Identity 付き SA を作らない（in-cluster Prometheus は AWS API を
  # 叩かないため IAM 不要）。chart デフォルトの SA に任せる。
  prometheusSpec:
    # 2 replica HA。同じ scrape を 2 本独立に走らせ、片方の Pod や AZ 障害で
    # メトリクスが完全に欠けないようにする。Service が 2 Pod 間で
    # ロードバランスするため Grafana 側の datasource 設定は変更不要。
    # データ重複排除（Thanos / Mimir 等）は導入しない: 短期保存の
    # ダッシュボード用途では 2 系列の値が同等で実害が無い。
    replicas: 2
    # 15 日保持。retention とサンプル取り込みレートで PVC 容量が決まる。
    # 60s scrape × ~70K series × 15 日 = 約 8GB（圧縮後）見込み。
    # gp3 20Gi はその約 2.5 倍のヘッドルームで、cardinality が増えても余裕がある。
    # 各 replica が独立に保管するため EBS 代は replicas 数に比例（20Gi × 2 = 40Gi）。
    retention: 15d
    # 全 Namespace の ServiceMonitor / PodMonitor を対象にする（PodMonitor を
    # 任意 NS に置けるようにするため）。
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    scrapeConfigSelectorNilUsesHelmValues: false
    # tolerations 未指定で system-nodegroup に乗る（kafka nodegroup の
    # DedicatedKafka taint には toleration を持たないため自然に弾かれる）
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 1Gi
        cpu: 500m
    # 2 replica を別 AZ に分散させて AZ 単一障害耐性を確保する。
    # ScheduleAnyway は best-effort（AZ 偏りを許容してでも schedule する）。
    # DoNotSchedule にすると Node 不足や AZ 不整合で Pod が Pending に陥り、
    # 起動失敗が監視欠損に直結するため避ける。
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: prometheus
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 20Gi

prometheusOperator:
  enabled: true

alertmanager:
  enabled: false

grafana:
  enabled: true
  defaultDashboardsEnabled: true
  grafana.ini:
    log:
      level: warn
  # CDK 側で Pod Identity 紐付き SA を作成するため Helm からは作らない。
  # IAM 不要（in-cluster Prometheus を query するだけ）。SA は CDK で作るため
  # chart からは create: false にする。
  serviceAccount:
    create: false
    name: grafana
  adminPassword: admin
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
      logLevel: WARN
    datasources:
      enabled: true
      searchNamespace: ALL
      logLevel: WARN
  # chart デフォルトで in-cluster Prometheus を datasource (name: Prometheus,
  # isDefault: true) として自動登録する。Strimzi 公式 dashboard が "Prometheus"
  # 名でハードコード参照するため、デフォルトのまま維持。

# node-exporter は DaemonSet なので全 Taint を許容する
prometheus-node-exporter:
  tolerations:
    - operator: Exists

# kube-state-metrics / prometheusOperator は toleration 未指定のまま system に乗る
# （kafka nodegroup の DedicatedKafka taint で kafka ノードからは弾かれる）
